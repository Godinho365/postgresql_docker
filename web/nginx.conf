server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;

    # Redirect relativo (nao adiciona porta/host errado ao ir de /dsg para /dsg/)
    absolute_redirect off;

    index  index.html;

    # Acessar so o IP tambem leva para a pagina DSG
    location = / {
        return 302 /dsg/;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
